name: hexaiq_app
description: "HexaIQ MVP Flutter app scaffold for Android, iOS, phone, and tablet."
publish_to: 'none'

version: 1.0.1+101

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/patterns/
    - assets/patterns/shapes/
    - assets/patterns/icons/
    - assets/patterns/objects/
    - assets/patterns/animals/
    - assets/patterns/foods/
    - assets/patterns/symbols/
    - assets/patterns/vehicles/
    - assets/pattern_packs/basic_pack/
    - assets/pattern_packs/kids_pack/
    - assets/pattern_packs/advanced_pack/
    - assets/pattern_packs/professional_pack/
    - assets/legal/
    - assets/store/
